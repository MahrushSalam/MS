<!DOCTYPE html>
<html>
<head>
    <title>Smart Gesture Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hammer.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #121212;
            color: white;
            transition: 0.3s;
        }

        .light {
            background: #f5f5f5;
            color: black;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .title { font-size: 2rem; }
        .status { margin-top: 10px; color: gray; }
        .big { font-size: 1.5rem; margin-top: 20px; }

        .pulse {
            border: 4px solid #00ff88;
        }
    </style>
</head>

<body>
<div id="app">
    <div class="title" id="page">🏠 Home</div>
    <div class="big" id="action">Menunggu gesture...</div>
    <div class="status">Swipe | Tap 2x | Hold | Pinch</div>
</div>

<script>
const app = document.getElementById("app");
const action = document.getElementById("action");
const page = document.getElementById("page");

let currentPage = 0;
let pages = ["🏠 Home", "🎵 Music", "⚙️ Settings"];

let isPlaying = false;
let volume = 50;

// Hammer init
const mc = new Hammer(app);

// aktifkan semua gesture
mc.get('swipe').set({ direction: Hammer.DIRECTION_ALL });
mc.get('pinch').set({ enable: true });
mc.get('tap').set({ taps: 2 });
mc.get('press').set({ time: 500 });

// === NAVIGATION ===
mc.on("swipeleft", () => {
    currentPage = (currentPage + 1) % pages.length;
    updatePage("➡️ Next Page");
});

mc.on("swiperight", () => {
    currentPage = (currentPage - 1 + pages.length) % pages.length;
    updatePage("⬅️ Previous Page");
});

// === SCROLL / EXTRA ===
mc.on("swipeup", () => {
    action.innerText = "🔼 Scroll Up / Refresh";
    pulse();
});

mc.on("swipedown", () => {
    action.innerText = "🔽 Open Notification";
    pulse();
});

// === DOUBLE TAP ===
mc.on("tap", () => {
    action.innerText = "⭐ Added to Favorite";
    pulse();
});

// === LONG PRESS ===
mc.on("press", () => {
    action.innerText = "📱 Quick Menu Opened";
    pulse();
});

// === PINCH (ZOOM = VOLUME) ===
mc.on("pinch", (ev) => {
    volume = Math.min(100, Math.max(0, volume + (ev.scale - 1) * 10));
    action.innerText = "🔊 Volume: " + Math.round(volume);
});

// === SPECIAL: MUSIC PAGE ===
mc.on("doubletap", () => {
    if (pages[currentPage] === "🎵 Music") {
        isPlaying = !isPlaying;
        action.innerText = isPlaying ? "▶️ Play Music" : "⏸ Pause Music";
        pulse();
    }
});

// === SETTINGS PAGE ===
mc.on("pressup", () => {
    if (pages[currentPage] === "⚙️ Settings") {
        document.body.classList.toggle("light");
        action.innerText = "🌙 Toggle Dark Mode";
        pulse();
    }
});

function updatePage(text) {
    page.innerText = pages[currentPage];
    action.innerText = text;
    pulse();
}

function pulse() {
    app.classList.add("pulse");
    setTimeout(() => app.classList.remove("pulse"), 200);
}
</script>

</body>
</html>
