<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Gesture PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#121212;
    color:white;
    overflow:hidden;
    transition:0.3s;
}

.light {
    background:#f5f5f5;
    color:black;
}

#app {
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.3s;
}

.page-title { font-size:2rem; }
.action { font-size:1.4rem; margin-top:10px; }
.info { font-size:0.9rem; color:gray; margin-top:10px; }

/* dots indicator */
.dots {
    position:absolute;
    bottom:20px;
    display:flex;
    gap:8px;
}

.dot {
    width:10px;
    height:10px;
    border-radius:50%;
    background:#555;
}

.active {
    background:#00ff88;
}

/* visual feedback */
.pulse {
    transform:scale(1.03);
    box-shadow:0 0 30px #00ff88;
}

/* fake image for gallery */
.box {
    width:150px;
    height:150px;
    background:#333;
    margin-top:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:15px;
    transition:0.2s;
}
</style>
</head>

<body>

<div id="app">
    <div class="page-title" id="page">🏠 Home</div>
    <div class="action" id="action">Menunggu gesture...</div>
    <div class="info">Swipe | Tap | Hold | Pinch | Rotate</div>

    <div class="box" id="box">📦</div>

    <div class="dots" id="dots"></div>
</div>

<script>
const app = document.getElementById("app");
const action = document.getElementById("action");
const page = document.getElementById("page");
const box = document.getElementById("box");
const dotsContainer = document.getElementById("dots");

const pages = ["🏠 Home","🎵 Music","📸 Gallery","⚙️ Settings"];
let currentPage = 0;

let volume = 50;
let playing = false;
let scale = 1;
let rotation = 0;

/* create dots */
pages.forEach((_,i)=>{
    const d=document.createElement("div");
    d.classList.add("dot");
    if(i===0) d.classList.add("active");
    dotsContainer.appendChild(d);
});

function updateDots(){
    [...dotsContainer.children].forEach((d,i)=>{
        d.classList.toggle("active", i===currentPage);
    });
}

function updatePage(text){
    page.innerText = pages[currentPage];
    action.innerText = text;
    updateDots();
    pulse();
}

/* HAMMER */
const mc = new Hammer(app);

mc.get('swipe').set({ direction: Hammer.DIRECTION_ALL });
mc.get('pinch').set({ enable:true });
mc.get('rotate').set({ enable:true });
mc.get('tap').set({ taps:2 });
mc.get('press').set({ time:500 });

/* SWIPE NAV */
mc.on("swipeleft", ()=>{
    currentPage = (currentPage+1)%pages.length;
    updatePage("➡️ Next");
});

mc.on("swiperight", ()=>{
    currentPage = (currentPage-1+pages.length)%pages.length;
    updatePage("⬅️ Back");
});

/* UP DOWN */
mc.on("swipeup", ()=>{
    action.innerText = "🔼 Scroll / Refresh";
    pulse();
});

mc.on("swipedown", ()=>{
    action.innerText = "🔽 Open Panel";
    pulse();
});

/* TAP */
mc.on("tap", ()=>{
    action.innerText = "⭐ Favorite";
    pulse();
});

/* PRESS */
mc.on("press", ()=>{
    action.innerText = "📱 Quick Menu";
    pulse();
});

/* MUSIC PAGE */
mc.on("doubletap", ()=>{
    if(pages[currentPage]==="🎵 Music"){
        playing=!playing;
        action.innerText = playing ? "▶️ Playing" : "⏸ Paused";
        pulse();
    }
});

/* PINCH (volume / zoom) */
mc.on("pinch", (ev)=>{
    if(pages[currentPage]==="🎵 Music"){
        volume = Math.min(100, Math.max(0, volume + (ev.scale-1)*10));
        action.innerText = "🔊 Volume: "+Math.round(volume);
    }
    if(pages[currentPage]==="📸 Gallery"){
        scale = ev.scale;
        box.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        action.innerText = "🔍 Zoom";
    }
});

/* ROTATE */
mc.on("rotate", (ev)=>{
    if(pages[currentPage]==="📸 Gallery"){
        rotation = ev.rotation;
        box.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        action.innerText = "🔄 Rotate";
    }
});

/* SETTINGS */
mc.on("pressup", ()=>{
    if(pages[currentPage]==="⚙️ Settings"){
        document.body.classList.toggle("light");
        action.innerText = "🌙 Toggle Theme";
        pulse();
    }
});

function pulse(){
    app.classList.add("pulse");
    setTimeout(()=>app.classList.remove("pulse"),200);
}
</script>

</body>
</html>
